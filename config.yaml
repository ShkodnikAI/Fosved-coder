llm:
  default_model: "claude-sonnet-4-20250514"
  router_model: ""
  api_base: ""
  api_key: ""
  temperature: 0.2
  max_tokens: 4096
system:
  db_url: "sqlite+aiosqlite:///fosved_coder.db"
  projects_dir: "./projects"
  ideas_cache_dir: "./.cache/ideas"
  archives_dir: "./archives"
  max_iterations: 3
  max_context_files: 20
  max_idea_files: 10
  max_file_size_kb: 50
security:
  allowed_commands:
    - git
    - python
    - pip
    - npm
    - node
    - gradlew
    - ./gradlew
    - cat
    - ls
    - dir
    - echo
    - mkdir
    - cd
  blocked_patterns:
    - "rm -rf /"
    - "DROP DATABASE"
    - "FORMAT C:"
