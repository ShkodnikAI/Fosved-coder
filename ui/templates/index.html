<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fosved Coder</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<header class="header">
    <div class="logo">⚡</div>
    <div class="header-title">FOSVED CODER</div>
    <div class="header-actions">
        <button class="btn-clear-chat" onclick="clearChat()" title="Clear">🗑 Clear</button>
        <button class="btn-stop" onclick="stopAction()" title="Stop">⏹ Stop</button>
    </div>
</header>

<div class="main-layout">
    <aside class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-header">
                <span class="sidebar-title">📁 Projects</span>
                <button class="btn-add" onclick="openNewProject()">+</button>
            </div>
            <div id="projects-list" class="sidebar-list"></div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-header">
                <span class="sidebar-title" id="models-title">🤖 AI Models</span>
                <button class="btn-add" onclick="openManageKeys()">🔑</button>
            </div>
            <div id="models-list" class="sidebar-list"></div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-header">
                <span class="sidebar-title">🔗 GitHub</span>
            </div>
            <div class="github-form">
                <input type="password" id="github-token" placeholder="Paste token..." class="input-sm">
                <button class="btn-sm" onclick="saveGithubToken()">Save</button>
            </div>
            <div id="github-user-info"></div>
        </div>
    </aside>

    <main class="content">
        <div id="chat-messages"></div>
        <div class="chat-file-preview" id="chat-files"></div>
        <div class="chat-model-bar">
            <label>🤖 Model:</label>
            <select id="chat-model-select" class="chat-model-select" onchange="onChatModelChange()"></select>
            <span id="chat-model-status" class="chat-model-status"></span>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <button class="btn-attach" onclick="document.getElementById('chat-file-input').click()" title="Attach">📎</button>
                <input type="file" id="chat-file-input" style="display:none" multiple onchange="addChatFiles(this)">
                <textarea id="user-input" placeholder="Ask AI anything...  Type: read filename.py to read project files" rows="6"></textarea>
                <button class="btn-send" onclick="sendMessage()">➤</button>
            </div>
        </div>
        <div class="quick-bar" id="quick-bar"></div>
    </main>
</div>

<div class="modal" id="modal-project" style="display:none">
    <div class="modal-overlay" onclick="closeModal('modal-project')"></div>
    <div class="modal-box modal-wide">
        <h2 id="proj-modal-title">New Project</h2>
        <input type="hidden" id="proj-edit-id" value="">
        <label>Project Name</label>
        <input id="proj-name" placeholder="My project">
        <label>Description</label>
        <textarea id="proj-desc" rows="2" placeholder="Short description"></textarea>
        <label>Project Folder (local path)</label>
        <input id="proj-folder" placeholder="e.g. D:\AI_projectS\MyApp">
        <label>GitHub Repository URL</label>
        <input id="proj-github" placeholder="e.g. https://github.com/user/repo">
        <label>Prompt</label>
        <textarea id="proj-prompt" rows="3" placeholder="Describe what you want to build..."></textarea>
        <label>Instructions</label>
        <textarea id="proj-instructions" rows="3" placeholder="Coding rules, tech stack, constraints..."></textarea>
        <label>Attach prompt file (optional)</label>
        <div class="file-upload-area">
            <input type="file" id="proj-file" onchange="previewFile(this,'proj-preview')">
            <div id="proj-preview" class="file-preview"></div>
        </div>
        <label>Ideas</label>
        <div class="idea-input-row">
            <input type="text" id="proj-idea-input" placeholder="Add an idea...">
            <button class="btn-sm btn-accent" onclick="addProjIdea()">+ Add</button>
        </div>
        <div id="proj-ideas-list" class="idea-tags"></div>
        <label>AI Model for this project</label>
        <select id="proj-model-select" class="input-full"><option value="">-- Auto --</option></select>
        <div class="modal-buttons">
            <button class="btn-primary" onclick="saveProject()">Save</button>
            <button class="btn-cancel" onclick="closeModal('modal-project')">Cancel</button>
        </div>
    </div>
</div>

<div class="modal" id="modal-keys" style="display:none">
    <div class="modal-overlay" onclick="closeModal('modal-keys')"></div>
    <div class="modal-box modal-wide">
        <h2>Manage API Keys</h2>
        <label>Provider</label>
        <select id="key-provider" class="input-full"><option value="">-- Select --</option></select>
        <label>API Key</label>
        <input type="password" id="key-api-key" class="input-full" placeholder="sk-...">
        <label>Models (add one by one)</label>
        <div class="model-input-row">
            <input type="text" id="key-model-input" placeholder="e.g. gpt-4o, claude-3-opus">
            <button class="btn-sm btn-accent" onclick="addTempModel()">+ Add</button>
        </div>
        <div id="key-models-list" class="model-tags"></div>
        <hr>
        <h3>Saved Keys</h3>
        <div id="saved-keys-list"></div>
        <div class="modal-buttons">
            <button class="btn-primary" onclick="saveKey()">Save Key</button>
            <button class="btn-cancel" onclick="closeModal('modal-keys')">Cancel</button>
        </div>
    </div>
</div>

<div class="modal" id="modal-link" style="display:none">
    <div class="modal-overlay" onclick="closeModal('modal-link')"></div>
    <div class="modal-box modal-wide">
        <h2 id="link-modal-title">Manage Links</h2>
        <div id="link-list"></div>
        <hr>
        <h3>Add Link</h3>
        <label>Label</label>
        <input id="link-label" class="input-full" placeholder="e.g. My Server">
        <label>URL</label>
        <input id="link-url" class="input-full" placeholder="http://...">
        <div class="modal-buttons">
            <button class="btn-primary" onclick="saveLink()">Save</button>
            <button class="btn-cancel" onclick="closeModal('modal-link')">Cancel</button>
        </div>
    </div>
</div>

<div class="modal" id="modal-files" style="display:none">
    <div class="modal-overlay" onclick="closeModal('modal-files')"></div>
    <div class="modal-box modal-wide" style="height:70vh;display:flex;flex-direction:column">
        <h2>📁 Project Files</h2>
        <div id="file-tree" class="file-tree" style="flex:0 0 auto;max-height:40vh"></div>
        <div id="file-viewer-area" style="flex:1;display:none;flex-direction:column;min-height:0">
            <div class="file-viewer-header">
                <span id="fv-path" class="path"></span>
                <span id="fv-info" class="info"></span>
            </div>
            <pre id="fv-code" class="file-viewer-code"></pre>
        </div>
        <div class="modal-buttons" style="margin-top:auto">
            <button class="btn-cancel" onclick="closeModal('modal-files')">Close</button>
        </div>
    </div>
</div>

<script>
var tempKeyModels=[],tempProjIdeas=[],currentLinkCategory='',chatAttachedFiles=[];
var allLinks=JSON.parse(localStorage.getItem('fosved_links')||'{}');
var allProjects=[],allModels=[],selectedProjectId='',selectedModelId='';
var ws=null,isGenerating=false,currentAiMsg='',codeBlockCounter=0;

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function openModal(id){document.getElementById(id).style.display='flex';}
function closeModal(id){document.getElementById(id).style.display='none';}

document.addEventListener('DOMContentLoaded',function(){
    loadProjects();loadModels();loadGithubToken();loadGithubUser();renderQuickBar();updateKeyStatus();connectWS();
});

/* ======== WEBSOCKET ======== */
function connectWS(){
    var proto=location.protocol==='https:'?'wss:':'ws:';
    ws=new WebSocket(proto+'//'+location.host+'/ws');
    ws.onopen=function(){loadChatHistory();};
    ws.onclose=function(){setTimeout(connectWS,3000);};
    ws.onerror=function(){};
    ws.onmessage=function(e){
        var d;try{d=JSON.parse(e.data);}catch(ex){return;}
        if(d.type==='token'){currentAiMsg+=d.content;updateStreamingMsg(currentAiMsg);}
        else if(d.type==='done'){isGenerating=false;currentAiMsg='';addCodeActions();}
        else if(d.type==='error'){isGenerating=false;currentAiMsg='';appendMsg('system','Error: '+d.message);}
    };
}
function updateStreamingMsg(text){
    var el=document.getElementById('chat-messages'),last=el.querySelector('.msg-streaming');
    if(!last){last=document.createElement('div');last.className='msg msg-ai msg-streaming';el.appendChild(last);}
    last.innerHTML=marked.parse(text)+'<span class="cursor-blink">\u258a</span>';
    el.scrollTop=el.scrollHeight;
}
function finishStreaming(){
    var el=document.getElementById('chat-messages'),last=el.querySelector('.msg-streaming');
    if(last){last.classList.remove('msg-streaming');last.innerHTML=marked.parse(currentAiMsg);}
}
function wsSend(obj){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(obj));else appendMsg('system','Reconnecting...');}

/* ======== CODE ACTIONS ======== */
function addCodeActions(){
    setTimeout(function(){
        var el=document.getElementById('chat-messages');
        el.querySelectorAll('.msg-ai:not(.msg-streaming)').forEach(function(msg){
            if(msg.querySelector('.code-actions'))return;
            msg.querySelectorAll('pre').forEach(function(pre){
                var code=pre.querySelector('code');if(!code)return;
                var lang=(code.className.match(/language-(\w+)/)||[])[1]||'text';
                var extMap={python:'py',javascript:'js',typescript:'ts',html:'html',css:'css',java:'java',cpp:'cpp',c:'c',go:'go',rust:'rs',ruby:'rb',php:'php',sql:'sql',bash:'sh',shell:'sh',json:'json',yaml:'yaml',yml:'yaml',xml:'xml',markdown:'md'};
                var ext=extMap[lang]||lang;
                var suggested='generated_'+(++codeBlockCounter)+'.'+ext;
                var div=document.createElement('div');div.className='code-actions';
                div.innerHTML='<button class="btn-code-save" onclick="saveCodeFile(this)" data-filename="'+suggested+'">💾 Save as '+suggested+'</button><button class="btn-code-copy" onclick="copyCode(this)">📋 Copy</button>';
                pre.parentNode.insertBefore(div,pre.nextSibling);
            });
        });
    },200);
}
function saveCodeFile(btn){
    var src=btn.parentElement.previousElementSibling.querySelector('code').textContent;
    var suggested=btn.getAttribute('data-filename')||'file.txt';
    var name=prompt('Save file as:',suggested);if(!name)return;
    if(!selectedProjectId){alert('Select a project.');return;}
    fetch('/api/projects/'+selectedProjectId+'/save-file',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:name,content:src})})
    .then(function(r){if(r.ok){btn.textContent='✅ '+name;alert('Saved: '+name);}else r.text().then(function(t){alert(t);});}).catch(function(e){alert(e.message);});
}
function copyCode(btn){
    var src=btn.parentElement.previousElementSibling.querySelector('code').textContent;
    navigator.clipboard.writeText(src).then(function(){btn.textContent='✅ Copied!';setTimeout(function(){btn.textContent='📋 Copy';},1500);}).catch(function(){alert('Copy failed');});
}

/* ======== PROJECT FILES ======== */
function openProjectFiles(){
    if(!selectedProjectId){alert('Select a project.');return;}
    fetch('/api/projects/'+selectedProjectId+'/tree').then(function(r){return r.json();}).then(function(d){
        var el=document.getElementById('file-tree');
        if(!d.tree||!d.tree.length){el.innerHTML='<div class="empty-hint">'+(d.folder?'Empty: '+esc(d.folder):'Folder not set. Edit project.')+'</div>';document.getElementById('file-viewer-area').style.display='none';openModal('modal-files');return;}
        el.innerHTML=d.tree.map(function(f){
            var ico,cls='';if(f.type==='dir'){ico='📁';cls=' file-tree-dir';}
            else{var ext=f.path.split('.').pop().toLowerCase();var icons={py:'🐍',js:'📜',ts:'📘',html:'🌐',css:'🎨',json:'📋',md:'📝',yaml:'⚙',yml:'⚙',txt:'📄',sh:'🔧',bat:'🔧',sql:'🗄',toml:'⚙',ini:'⚙',env:'🔑'};ico=icons[ext]||'📄';}
            var sz=f.size?(f.size>1024?(f.size/1024).toFixed(1)+'KB':f.size+'B'):'';
            return '<div class="file-tree-item'+cls+'" onclick="viewFile(\''+esc(f.path).replace(/'/g,"\\'")+'\','+(f.type==='dir')+')">'+'<span class="file-tree-icon">'+ico+'</span><span class="file-tree-name">'+esc(f.path)+'</span>'+(sz?'<span class="file-tree-size">'+sz+'</span>':'')+'</div>';
        }).join('');
        document.getElementById('file-viewer-area').style.display='none';openModal('modal-files');
    }).catch(function(e){alert(e.message);});
}
function viewFile(relPath,isDir){
    if(isDir||!selectedProjectId)return;
    document.getElementById('file-viewer-area').style.display='flex';
    document.getElementById('fv-path').textContent=relPath;
    document.getElementById('fv-info').textContent='Loading...';
    document.getElementById('fv-code').textContent='';
    document.querySelectorAll('.file-tree-item').forEach(function(i){i.classList.remove('active');});
    if(event&&event.currentTarget)event.currentTarget.classList.add('active');
    fetch('/api/projects/'+selectedProjectId+'/read-file?path='+encodeURIComponent(relPath))
    .then(function(r){return r.json();}).then(function(d){
        document.getElementById('fv-info').textContent=d.lines+' lines, '+(d.size>1024?(d.size/1024).toFixed(1)+'KB':d.size+'B');
        document.getElementById('fv-code').innerHTML=d.content.split('\n').map(function(line){return '<span class="file-line">'+esc(line)+'</span>';}).join('\n');
    }).catch(function(){document.getElementById('fv-info').textContent='Error';document.getElementById('fv-code').textContent='Failed to read: '+relPath;});
}

/* ======== GENERATE ======== */
function generateCode(){
    if(!selectedProjectId){alert('Select a project.');return;}
    var p=allProjects.find(function(x){return x.id===selectedProjectId;});if(!p)return;
    if(!p.prompt&&!p.instructions){alert('Add prompt/instructions to project first.');return;}
    var text='Generate complete code based on my project specification.';
    if(p.ideas&&p.ideas.length)text+='\n\nProject ideas: '+p.ideas.join(', ');
    text+='\n\nGenerate all necessary files with complete code. Use code blocks with filenames as comments.';
    if(isGenerating){alert('Wait for current response.');return;}
    appendMsg('user','⚡ GENERATE: '+text);isGenerating=true;currentAiMsg='';
    var model=document.getElementById('chat-model-select').value||'';
    if(!model&&p.selected_model)model=p.selected_model;
    if(!model&&allModels.length)model=allModels[0].model_id;
    wsSend({type:'chat',message:text,project_id:selectedProjectId,model:model});
}

/* ======== CHAT ======== */
function sendMessage(){
    var input=document.getElementById('user-input'),text=input.value.trim();
    if(!text&&!chatAttachedFiles.length)return;
    if(isGenerating){appendMsg('system','Wait for current response.');return;}
    if(text)appendMsg('user',text);
    chatAttachedFiles.forEach(function(f){
        var el=document.getElementById('chat-messages'),div=document.createElement('div');div.className='msg msg-file';
        var h='<div class="msg-file-card">';if(f.type.indexOf('image')===0)h+='<img src="'+URL.createObjectURL(f)+'">';
        h+='<div class="msg-file-info"><strong>'+esc(f.name)+'</strong><div class="size">'+(f.size/1024).toFixed(1)+' KB</div></div></div>';
        div.innerHTML=h;el.appendChild(div);
    });
    input.value='';chatAttachedFiles=[];renderChatFiles();
    var model=document.getElementById('chat-model-select').value||'';
    if(!model&&allModels.length)model=allModels[0].model_id;
    isGenerating=true;currentAiMsg='';
    wsSend({type:'chat',message:text,project_id:selectedProjectId,model:model});
}
function stopAction(){if(isGenerating){wsSend({type:'stop'});isGenerating=false;finishStreaming();appendMsg('system','Stopped.');}}
function appendMsg(role,text){var el=document.getElementById('chat-messages'),div=document.createElement('div');div.className='msg msg-'+role;div.innerHTML=role==='ai'?marked.parse(text):esc(text);el.appendChild(div);el.scrollTop=el.scrollHeight;if(role==='ai')addCodeActions();}

/* ======== CHAT HISTORY ======== */
function loadChatHistory(){
    var pid=selectedProjectId||'';
    fetch('/api/chat/'+encodeURIComponent(pid)).then(function(r){return r.json();}).then(function(msgs){
        var el=document.getElementById('chat-messages');el.innerHTML='';
        if(!msgs||!msgs.length){
            if(selectedProjectId){var p=allProjects.find(function(x){return x.id===selectedProjectId;});if(p){appendMsg('system','Project: '+p.name);if(p.instructions)appendMsg('ai','<strong>Instructions:</strong><br>'+marked.parse(p.instructions));}}
            else appendMsg('system','Connected to Fosved Coder');return;
        }
        if(selectedProjectId){var p=allProjects.find(function(x){return x.id===selectedProjectId;});if(p)appendMsg('system','Project: '+p.name);}
        var lastDate='';msgs.forEach(function(m){
            var ds=(m.timestamp||'').substring(0,10);if(ds&&ds!==lastDate){lastDate=ds;var de=document.createElement('div');de.className='chat-date-sep';de.textContent=ds;el.appendChild(de);}
            if(m.role==='user')appendMsg('user',m.content);else if(m.role==='ai')appendMsg('ai',m.content||'(empty)');else if(m.role==='system')appendMsg('system',m.content);
        });el.scrollTop=el.scrollHeight;addCodeActions();
    }).catch(function(){});
}
function clearChat(){var pid=selectedProjectId||'';if(!confirm('Clear history?'))return;fetch('/api/chat/'+encodeURIComponent(pid),{method:'DELETE'}).then(function(r){if(r.ok){document.getElementById('chat-messages').innerHTML='';if(selectedProjectId){var p=allProjects.find(function(x){return x.id===selectedProjectId;});if(p)appendMsg('system','Project: '+p.name);}else appendMsg('system','Cleared');}}).catch(function(){});}

/* ======== KEY STATUS ======== */
function updateKeyStatus(){fetch('/api/keys').then(function(r){return r.json();}).then(function(keys){var el=document.getElementById('models-title');if(keys&&keys.length){var a=keys.filter(function(k){return k.is_active;}).length;el.innerHTML='🤖 AI Models <span class="sidebar-badge">'+a+' key'+(a>1?'s':'')+'</span>';}else el.innerHTML='🤖 AI Models <span class="sidebar-badge warn">no keys</span>';}).catch(function(){});}

/* ======== PROJECTS ======== */
function loadProjects(){fetch('/api/projects').then(function(r){return r.json();}).then(function(list){allProjects=list||[];renderProjects();}).catch(function(){});}
function renderProjects(){
    var el=document.getElementById('projects-list');
    if(!allProjects.length){el.innerHTML='<div class="empty-hint">No projects yet</div>';return;}
    el.innerHTML=allProjects.map(function(p){
        var sel=p.id===selectedProjectId?' selected':'';
        var ideas=(p.ideas||[]).map(function(i){return '<span class="idea-chip">'+esc(i)+'</span>';}).join('');
        var model=p.selected_model?'<div class="project-model">Model: '+esc(p.selected_model)+'</div>':'';
        var folder=p.folder?'<div class="project-folder">📂 '+esc(p.folder)+'</div>':'';
        var gh=p.github_repo?'<div class="project-github">🐙 <a href="'+esc(p.github_repo)+'" target="_blank">'+esc(p.github_repo.replace('https://github.com/',''))+'</a></div>':'';
        var prog=p.progress||0,pp=Math.min(100,Math.max(0,prog)),pc=pp>=100?'green':pp>=50?'beige':pp>=25?'yellow':'red';
        var progressHtml='<div class="project-progress" onclick="event.stopPropagation();promptProgress(\''+p.id+'\')"><div class="progress-bar"><div class="progress-fill '+pc+'" style="width:'+pp+'%"></div></div><span class="progress-pct">'+pp+'%</span></div>';
        return '<div class="project-item'+sel+'" onclick="selectProject(\''+p.id+'\')"><div class="project-top"><div class="project-name">'+esc(p.name)+'</div><div class="project-btns"><button class="btn-generate" onclick="event.stopPropagation();generateCode()" title="Generate">⚡</button><button class="btn-generate" onclick="event.stopPropagation();openProjectFiles()" title="Files">📁</button><button class="project-btn-edit" onclick="event.stopPropagation();editProject(\''+p.id+'\')" title="Edit">✏</button><button class="project-delete" onclick="event.stopPropagation();deleteProject(\''+p.id+'\')" title="Delete">✕</button></div></div>'+(ideas?'<div class="project-ideas">'+ideas+'</div>':'')+model+folder+gh+'<div class="project-status">'+esc(p.status||'idle')+'</div>'+progressHtml+'</div>';
    }).join('');
}
function promptProgress(pid){var p=allProjects.find(function(x){return x.id===pid;});if(!p)return;var v=prompt('Progress % (0-100):',p.progress||0);if(v===null)return;var n=parseInt(v,10);if(isNaN(n))return;n=Math.min(100,Math.max(0,n));fetch('/api/projects/'+pid,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({progress:n,status:n>=100?'completed':'in progress'})}).then(function(){loadProjects();}).catch(function(){});}

function openNewProject(){
    document.getElementById('proj-modal-title').textContent='New Project';document.getElementById('proj-edit-id').value='';
    ['proj-name','proj-desc','proj-folder','proj-github','proj-prompt','proj-instructions'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('proj-file').value='';document.getElementById('proj-preview').innerHTML='';document.getElementById('proj-preview').style.display='none';
    tempProjIdeas=[];renderProjIdeas();loadModelSelect('');openModal('modal-project');
}
function editProject(id){
    var p=allProjects.find(function(x){return x.id===id;});if(!p)return;
    document.getElementById('proj-modal-title').textContent='Edit Project';document.getElementById('proj-edit-id').value=p.id;
    document.getElementById('proj-name').value=p.name||'';document.getElementById('proj-desc').value=p.description||'';
    document.getElementById('proj-folder').value=p.folder||'';document.getElementById('proj-github').value=p.github_repo||'';
    document.getElementById('proj-prompt').value=p.prompt||'';document.getElementById('proj-instructions').value=p.instructions||'';
    document.getElementById('proj-file').value='';document.getElementById('proj-preview').innerHTML='';document.getElementById('proj-preview').style.display='none';
    tempProjIdeas=p.ideas?p.ideas.slice():[];renderProjIdeas();loadModelSelect(p.selected_model||'');openModal('modal-project');
}
function loadModelSelect(cur){var sel=document.getElementById('proj-model-select');sel.innerHTML='<option value="">-- Auto --</option>';if(allModels)allModels.forEach(function(m){var o=document.createElement('option');o.value=m.model_id;o.textContent=m.model_id+' ('+m.provider+')'+(m.type==='free'?' FREE':'');if(m.model_id===cur)o.selected=true;sel.appendChild(o);});}
function addProjIdea(){var i=document.getElementById('proj-idea-input'),v=i.value.trim();if(!v)return;tempProjIdeas.push(v);i.value='';renderProjIdeas();}
function removeProjIdea(i){tempProjIdeas.splice(i,1);renderProjIdeas();}
function renderProjIdeas(){var el=document.getElementById('proj-ideas-list');if(!tempProjIdeas.length){el.innerHTML='<span style="color:#666;font-size:11px">No ideas</span>';return;}el.innerHTML=tempProjIdeas.map(function(idea,i){return '<span class="idea-tag">'+esc(idea)+' <button onclick="removeProjIdea('+i+')">✕</button></span>';}).join('');}
function saveProject(){
    var editId=document.getElementById('proj-edit-id').value,name=document.getElementById('proj-name').value.trim();
    if(!name){alert('Enter name');return;}
    var data={name:name,description:document.getElementById('proj-desc').value.trim(),folder:document.getElementById('proj-folder').value.trim(),github_repo:document.getElementById('proj-github').value.trim(),prompt:document.getElementById('proj-prompt').value.trim(),instructions:document.getElementById('proj-instructions').value.trim(),ideas:tempProjIdeas,selected_model:document.getElementById('proj-model-select').value};
    if(editId){fetch('/api/projects/'+editId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(function(r){if(r.ok){closeModal('modal-project');loadProjects();}else r.text().then(function(t){alert(t);});}).catch(function(e){alert(e.message);});}
    else{var fd=new FormData();['name','description','prompt','instructions'].forEach(function(k){fd.append(k,data[k]);});fd.append('ideas_json',JSON.stringify(data.ideas));fd.append('selected_model',data.selected_model);var fi=document.getElementById('proj-file');if(fi.files&&fi.files.length>0)fd.append('prompt_file',fi.files[0]);fetch('/api/projects',{method:'POST',body:fd}).then(function(r){if(r.ok){closeModal('modal-project');loadProjects();}else r.text().then(function(t){alert(t);});}).catch(function(e){alert(e.message);});}
}
function deleteProject(id){if(!confirm('Delete?'))return;fetch('/api/projects/'+id,{method:'DELETE'}).then(function(){loadProjects();}).catch(function(){});}
function selectProject(id){selectedProjectId=id;var p=allProjects.find(function(x){return x.id===id;});if(!p)return;selectedModelId=p.selected_model||'';renderProjects();updateChatModelSelect();loadChatHistory();}

/* ======== KEYS ======== */
function openManageKeys(){tempKeyModels=[];renderModelTags();document.getElementById('key-api-key').value='';loadProviders();loadSavedKeys();openModal('modal-keys');}
function loadProviders(){fetch('/api/providers').then(function(r){return r.json();}).then(function(list){var s=document.getElementById('key-provider');s.innerHTML='<option value="">-- Select --</option>';list.forEach(function(p){s.innerHTML+='<option value="'+p.id+'">'+esc(p.name)+'</option>';});}).catch(function(){});}
function loadSavedKeys(){fetch('/api/keys').then(function(r){return r.json();}).then(function(list){var el=document.getElementById('saved-keys-list');if(!list||!list.length){el.innerHTML='<div class="empty-hint">No keys</div>';return;}el.innerHTML=list.map(function(k){return '<div class="key-item"><span class="key-provider">'+esc(k.provider_name)+'</span><span class="key-models">'+esc((k.models||[]).join(', '))+'</span><button class="btn-del" onclick="deleteKey(\''+k.provider_id+'\')">✕</button></div>';}).join();}).catch(function(){});}
function addTempModel(){var i=document.getElementById('key-model-input'),v=i.value.trim();if(!v)return;tempKeyModels.push(v);i.value='';renderModelTags();}
function removeTempModel(i){tempKeyModels.splice(i,1);renderModelTags();}
function renderModelTags(){var el=document.getElementById('key-models-list');if(!tempKeyModels.length){el.innerHTML='<span style="color:#666;font-size:11px">No models</span>';return;}el.innerHTML=tempKeyModels.map(function(m,i){return '<span class="model-tag">'+esc(m)+' <button onclick="removeTempModel('+i+')">✕</button></span>';}).join('');}
function saveKey(){var p=document.getElementById('key-provider').value,k=document.getElementById('key-api-key').value.trim();if(!p){alert('Select provider');return;}if(!k){alert('Enter key');return;}var fd=new FormData();fd.append('provider_id',p);fd.append('api_key',k);fd.append('models_json',JSON.stringify(tempKeyModels));fetch('/api/keys',{method:'POST',body:fd}).then(function(r){if(r.ok){alert('Saved!');tempKeyModels=[];renderModelTags();document.getElementById('key-api-key').value='';loadSavedKeys();loadModels();updateKeyStatus();}else r.text().then(function(t){alert(t);});}).catch(function(e){alert(e.message);});}
function deleteKey(pid){if(!confirm('Delete?'))return;fetch('/api/keys/'+pid,{method:'DELETE'}).then(function(){loadSavedKeys();loadModels();updateKeyStatus();}).catch(function(){});}

/* ======== MODELS ======== */
function loadModels(){fetch('/api/models').then(function(r){return r.json();}).then(function(list){allModels=list||[];updateChatModelSelect();var el=document.getElementById('models-list');if(!allModels.length){el.innerHTML='<div class="empty-hint">No models</div>';return;}el.innerHTML=allModels.map(function(m){var dot,badge,bt;if(m.type==='free'){dot='green';badge='free';bt='FREE';}else if(m.has_key&&m.available){dot='green';badge='user';bt='KEY';}else if(m.has_key&&!m.available){dot='yellow';badge='user';bt='OFF';}else{dot='red';badge='locked';bt='NO KEY';}return '<div class="model-item"><span class="model-dot '+dot+'"></span><span class="model-name">'+esc(m.model_id)+'</span><span class="model-badge '+badge+'">'+bt+'</span><span class="model-provider">'+esc(m.provider)+'</span></div>';}).join();}).catch(function(){});}
function onChatModelChange(){selectedModelId=document.getElementById('chat-model-select').value;updateModelStatus();}
function updateChatModelSelect(){
    var sel=document.getElementById('chat-model-select');sel.innerHTML='';
    if(!allModels.length){sel.innerHTML='<option value="">No models</option>';document.getElementById('chat-model-status').textContent='';return;}
    var uM=allModels.filter(function(m){return m.type==='user';}),fM=allModels.filter(function(m){return m.type!=='user';});
    if(uM.length){var og=document.createElement('optgroup');og.label='Your Models';uM.forEach(function(m){var o=document.createElement('option');o.value=m.model_id;o.textContent=m.model_id+' ('+m.provider+')';if(!m.has_key||!m.available)o.disabled=true;og.appendChild(o);});sel.appendChild(og);}
    if(fM.length){var og2=document.createElement('optgroup');og2.label='Free Models';fM.forEach(function(m){var o=document.createElement('option');o.value=m.model_id;o.textContent=m.model_id+' ('+m.provider+')';og2.appendChild(o);});sel.appendChild(og2);}
    var t=selectedModelId||'';if(!t&&selectedProjectId){var p=allProjects.find(function(x){return x.id===selectedProjectId;});if(p&&p.selected_model)t=p.selected_model;}
    if(!t&&uM.length)t=uM[0].model_id;if(!t&&fM.length)t=fM[0].model_id;
    sel.value=t;if(!sel.value&&sel.options.length)sel.selectedIndex=0;selectedModelId=sel.value;updateModelStatus();
}
function updateModelStatus(){var sel=document.getElementById('chat-model-select'),st=document.getElementById('chat-model-status'),mid=sel.value;if(!mid){st.textContent='';return;}var m=allModels.find(function(x){return x.model_id===mid;});if(!m){st.textContent='';return;}if(m.has_key&&m.available){st.textContent='KEY';st.className='chat-model-status active';}else if(m.type==='free'){st.textContent='FREE';st.className='chat-model-status active';}else{st.textContent='NO KEY';st.className='chat-model-status inactive';}}

/* ======== GITHUB ======== */
function loadGithubToken(){fetch('/api/github/token').then(function(r){return r.json();}).then(function(d){document.getElementById('github-token').value=d.token||'';}).catch(function(){});}
function saveGithubToken(){var t=document.getElementById('github-token').value.trim();fetch('/api/github/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})}).then(function(r){if(r.ok){alert('Saved!');loadGithubUser();}else r.text().then(function(x){alert(x);});}).catch(function(e){alert(e.message);});}
function loadGithubUser(){fetch('/api/github/user').then(function(r){return r.json();}).then(function(d){var el=document.getElementById('github-user-info');if(!d.user||d.user==='invalid token'){el.innerHTML='';return;}var repos='';if(d.repos&&d.repos.length)repos='<div class="github-repos">'+d.repos.map(function(r){return '<a class="github-repo" href="'+esc(r.url)+'" target="_blank">'+esc(r.name)+'</a>';}).join('')+'</div>';el.innerHTML='<div class="github-user"><span>👤</span><span class="github-user-name">'+esc(d.user)+'</span></div>'+repos;}).catch(function(){});}

/* ======== FILES ======== */
function previewFile(input,pid){var el=document.getElementById(pid);el.innerHTML='';if(input.files&&input.files[0]){var f=input.files[0],card=document.createElement('div');card.className='file-card';if(f.type.indexOf('image')===0){var img=document.createElement('img');img.src=URL.createObjectURL(f);card.appendChild(img);}var info=document.createElement('div');info.className='file-info';info.innerHTML='<strong>'+esc(f.name)+'</strong><br>'+(f.size/1024).toFixed(1)+' KB';card.appendChild(info);el.appendChild(card);el.style.display='block';}else el.style.display='none';}
function addChatFiles(input){if(!input.files)return;for(var i=0;i<input.files.length;i++)chatAttachedFiles.push(input.files[i]);input.value='';renderChatFiles();}
function removeChatFile(idx){chatAttachedFiles.splice(idx,1);renderChatFiles();}
function renderChatFiles(){var el=document.getElementById('chat-files');if(!chatAttachedFiles.length){el.className='chat-file-preview';el.innerHTML='';return;}el.className='chat-file-preview has-files';el.innerHTML=chatAttachedFiles.map(function(f,idx){var thumb=f.type.indexOf('image')===0?'<img src="'+URL.createObjectURL(f)+'">':'';return '<div class="chat-file-card">'+thumb+'<span>'+esc(f.name)+' ('+(f.size/1024).toFixed(1)+' KB)</span><button class="chat-file-remove" onclick="removeChatFile('+idx+')">✕</button></div>';}).join('');}

/* ======== QUICK BAR ======== */
var CATS=[{id:'github',name:'GitHub',ico:'🐙'},{id:'server',name:'Server',ico:'🖥'},{id:'database',name:'Database',ico:'🗄'},{id:'website',name:'Website',ico:'🌐'},{id:'docs',name:'Docs',ico:'📋'},{id:'custom',name:'Custom',ico:'🔗'}];
function openLinkModal(cat){currentLinkCategory=cat;var c=CATS.find(function(x){return x.id===cat;});document.getElementById('link-modal-title').textContent=c.name+' Links';document.getElementById('link-label').value='';document.getElementById('link-url').value='';renderLinkList(cat);openModal('modal-link');}
function renderLinkList(cat){var el=document.getElementById('link-list'),links=allLinks[cat]||[];if(!links.length){el.innerHTML='<div class="empty-hint">No links</div>';return;}el.innerHTML=links.map(function(lk,idx){return '<div class="key-item"><span class="key-provider">'+esc(lk.label)+'</span><span class="key-models"><a href="'+esc(lk.url)+'" target="_blank" style="color:#C8A97E;text-decoration:none">'+esc(lk.url)+'</a></span><button class="btn-del" onclick="removeLink(\''+cat+'\','+idx+')">✕</button></div>';}).join('');}
function saveLink(){var l=document.getElementById('link-label').value.trim(),u=document.getElementById('link-url').value.trim();if(!l||!u){alert('Enter label and URL');return;}if(!allLinks[currentLinkCategory])allLinks[currentLinkCategory]=[];allLinks[currentLinkCategory].push({label:l,url:u});localStorage.setItem('fosved_links',JSON.stringify(allLinks));renderLinkList(currentLinkCategory);renderQuickBar();document.getElementById('link-label').value='';document.getElementById('link-url').value='';}
function removeLink(cat,idx){allLinks[cat].splice(idx,1);localStorage.setItem('fosved_links',JSON.stringify(allLinks));renderLinkList(cat);renderQuickBar();}
function renderQuickBar(){document.getElementById('quick-bar').innerHTML=CATS.map(function(c){var links=allLinks[c.id]||[];var h='<div class="qb-group"><button class="qb-cat" onclick="openLinkModal(\''+c.id+'\')"><span class="qb-ico">'+c.ico+'</span> '+esc(c.name)+'</button>';links.forEach(function(lk,idx){h+='<button class="qb-link" onclick="window.open(\''+esc(lk.url).replace(/'/g,"\\'")+'\',\'_blank\')">'+esc(lk.label)+'<span class="qb-link-x" onclick="event.stopPropagation();removeLink(\''+c.id+'\','+idx+')">×</span></button>';});return h+'</div>';}).join('');}

document.addEventListener('keydown',function(e){
    if(e.target.id==='key-model-input'&&e.key==='Enter'){e.preventDefault();addTempModel();}
    if(e.target.id==='proj-idea-input'&&e.key==='Enter'){e.preventDefault();addProjIdea();}
    if(e.target.id==='user-input'&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});
</script>
</body>
